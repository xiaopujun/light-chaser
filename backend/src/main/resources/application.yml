spring:
  mvc:
    throw-exception-if-no-handler-found: true
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: "jdbc:sqlite:${user.dir}/lc-server.db"
    username:
    password:
    # 使用HikariCP连接池
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB



# mybatis-plus配置
mybatis-plus:
  type-aliases-package: com.dagu.lightchaser.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


light-chaser:
  #  project-resource-path: ./data/resources # 项目资源路径
  migration: # 是否自动跑sql脚本
    enable: true
  ai:
    # 通过环境变量或直接修改模型配置来启用 AI 功能。
    # 开源版提供模型管理页，但不提供 AI 生成组件功能。
    enabled: true
    models:
      - id: default
        label: 默认模型
        provider: openai-compatible
        model-name: ${LC_AI_MODEL:gpt-4o-mini}
        base-url: ${LC_AI_BASE_URL:https://api.openai.com/v1}
        api-key: ${LC_AI_API_KEY:}
        api-key-header: Authorization
        api-key-prefix: Bearer
        chat-completions-path: /chat/completions
        enabled: true
        is-default: true
        temperature: 0.3
        max-tokens: 2048
  crypto:
    rsa:
      public-key-path: keys/public_key.pem # RSA公钥文件路径，若不存在会在 project-resource-path/keys 下自动生成
      private-key-path: keys/private_key.pem # RSA私钥文件路径，若不存在会在 project-resource-path/keys 下自动生成
    aes:
      key: YmVVaTJUNGdvV3huQnZXZzlEUE9kdnBaaS9ZcTZ0UzZtWXl2TWVXTzQ0Qz0= # 后端 AES 密钥，需与前端约定保持一致


logging:
  config: classpath:log4j2-spring.xml
  level:
    cn.jay.repository: info
